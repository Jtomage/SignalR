services: 
  chatroomapi: 
    build: 
      context: ./src
      dockerfile: Chatroom.WebAPI/Dockerfile
    ports: 
      - 8080:8080
      - 8081:8081
    environment: 
      ASPNETCORE_HTTPS_PORTS: 8081
      ASPNETCORE_HTTP_PORTS: 8080
      ASPNETCORE_Kestrel__Certificates__Default__Path: /cert/demo-cert.pfx
      ASPNETCORE_Kestrel__Certificates__Default__Password: Password1
    volumes: 
      - .:/cert

  chatroomfront:
    build: 
      context: ./src
      dockerfile: Chatroom.React/Dockerfile
    ports: 
      - 5000:80
    environment: 
      chathub_url: https://localhost:8081/chathub